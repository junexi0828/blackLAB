company_name: blackLAB
default_mode: codex
mission_style: profit-first operator
parallel_strategy: full_parallel
max_parallel_departments: 9
enable_final_review: true
final_review_label: Board Review
final_review_output_title: Operator Briefing
codex_worker_timeout_seconds: 420
codex_worker_hard_timeout_seconds: 7200
codex_retry_attempts: 1
departments:
  - key: ceo
    label: CEO
    purpose: Set direction, ambition, and the current winning narrative.
    output_title: Company Brief
    temperature: 0.2
    resource_lane: strategy
    priority: 10
  - key: research
    label: Research
    purpose: Map demand, customer pain, market timing, and competitor gaps.
    output_title: Market Research Memo
    temperature: 0.2
    resource_lane: strategy
    priority: 20
  - key: product
    label: Product
    purpose: Turn research into a product wedge, roadmap, and scope.
    output_title: Product Strategy
    temperature: 0.3
    resource_lane: strategy
    priority: 30
  - key: design
    label: Design
    purpose: Define user journey, interaction approach, and launch experience.
    output_title: Design Spec
    temperature: 0.4
    resource_lane: strategy
    priority: 50
  - key: dev_1
    label: Dev 1
    purpose: Own backend architecture, runtime services, APIs, and production constraints.
    output_title: Backend Delivery Plan
    temperature: 0.1
    resource_lane: delivery
    priority: 35
  - key: dev_2
    label: Dev 2
    purpose: Own product implementation, application flows, and feature delivery details.
    output_title: Product Delivery Plan
    temperature: 0.1
    resource_lane: delivery
    priority: 40
  - key: dev_3
    label: Dev 3
    purpose: Own integrations, automation, release hardening, and technical QA hooks.
    output_title: Integration Delivery Plan
    temperature: 0.1
    resource_lane: delivery
    priority: 45
  - key: growth
    label: Growth
    purpose: Produce distribution bets, positioning, and go-to-market actions.
    output_title: Growth Plan
    temperature: 0.3
    resource_lane: strategy
    priority: 60
  - key: finance
    label: Finance
    purpose: Translate the plan into pricing, costs, and near-term economics.
    output_title: Unit Economics Snapshot
    temperature: 0.1
    resource_lane: strategy
    priority: 40
review_departments:
  - key: validation
    label: Validation
    purpose: Check whether the company thesis is executable, measurable, and tied to real proof points.
    output_title: Validation Memo
    temperature: 0.1
    runtime_tier: review
    resource_lane: review
    priority: 10
    depends_on: [ceo, research, product, design, dev_1, dev_2, dev_3, growth, finance]
  - key: test_lab
    label: Test Lab
    purpose: Stress-test the plan against failure modes, rollout risks, and operational edge cases.
    output_title: Test Matrix
    temperature: 0.1
    runtime_tier: review
    resource_lane: review
    priority: 20
    depends_on: [ceo, research, product, design, dev_1, dev_2, dev_3, growth, finance]
  - key: quality_gate
    label: Quality Gate
    purpose: Score the package for coherence, launch readiness, and missing handoff details before board review.
    output_title: Quality Gate Report
    temperature: 0.1
    runtime_tier: review
    resource_lane: review
    priority: 30
    depends_on: [ceo, research, product, design, dev_1, dev_2, dev_3, growth, finance]
