<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BlackLAB Factory{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <aside class="shell-sidebar">
        <div>
          <a class="brand" href="/">blackLAB Factory</a>
          <p class="subhead">Autonomous venture studio control plane</p>
        </div>
        <nav class="shell-nav">
          <a class="nav-link {% if request.url.path == '/' %}is-active{% endif %}" href="/">Overview</a>
          <a class="nav-link {% if request.url.path == '/launch' %}is-active{% endif %}" href="/launch">Launch</a>
          <a class="nav-link {% if request.url.path == '/autopilot' %}is-active{% endif %}" href="/autopilot">Autopilot</a>
          <a class="nav-link {% if request.url.path == '/operator' %}is-active{% endif %}" href="/operator">Operator Chat</a>
          <a class="nav-link {% if request.url.path == '/runs' %}is-active{% endif %}" href="/runs">Runs</a>
          <a class="nav-link {% if request.url.path == '/loops' %}is-active{% endif %}" href="/loops">Loops</a>
          <a class="nav-link {% if request.url.path.startswith('/console') %}is-active{% endif %}" href="/console">3D Campus (Console)</a>
          <a class="nav-link {% if request.url.path == '/settings' %}is-active{% endif %}" href="/settings">Settings</a>
        </nav>
        <div class="sidebar-note">
          <strong>Surface Reference</strong>
          <p>Tabler-inspired multipage operator shell over the existing blackLAB engine.</p>
        </div>
      </aside>
      <main class="layout">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
